<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Microcredito Inteligente</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

        .auth-glow {
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 36%),
                radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.1), transparent 32%),
                #0a0a0a;
        }

        .auth-card {
            background: rgba(18, 18, 18, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(63, 63, 70, 0.8);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
        }

        .field {
            background: rgba(10, 10, 10, 0.78);
            border: 1px solid rgba(63, 63, 70, 0.9);
            transition: border-color 180ms ease, box-shadow 180ms ease;
        }

        .field:focus {
            border-color: rgba(16, 185, 129, 0.72);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.14);
            outline: none;
        }
    </style>
</head>
<body class="auth-glow min-h-screen text-zinc-100 selection:bg-emerald-500/30">
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[900px] h-[420px] bg-emerald-500/5 blur-[120px] rounded-full pointer-events-none"></div>

    <main class="relative z-10 min-h-screen w-full flex items-center justify-center p-6">
        <section class="w-full max-w-5xl grid gap-8 lg:grid-cols-[1fr_420px] lg:items-center">
            <div class="text-center lg:text-left">
                <a href="index.html" class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm font-medium mb-8">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    Microcredito Inteligente
                </a>

                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-white mb-6">
                    Acesso ao <span class="text-emerald-500">Painel</span>
                </h1>

                <p class="text-lg text-zinc-400 leading-relaxed max-w-xl mx-auto lg:mx-0">
                    Entre para acompanhar solicitações, atualizar status, conferir dados do cliente e gerenciar o caixa disponível.
                </p>
            </div>

            <div class="auth-card rounded-2xl p-6 md:p-8">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 mb-6">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>

                <div class="mb-8">
                    <p class="text-sm font-semibold text-emerald-400 mb-2">Área administrativa</p>
                    <h2 class="text-2xl font-extrabold text-white">Entrar no painel</h2>
                </div>

                <form id="form-login" class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-zinc-300 mb-2">E-mail</label>
                        <div class="relative">
                            <i data-lucide="mail" class="w-5 h-5 text-zinc-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input
                                class="field w-full rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-zinc-600"
                                type="email"
                                id="email"
                                name="email"
                                placeholder="admin@creditofacil.com"
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>

                    <div>
                        <label for="senha" class="block text-sm font-semibold text-zinc-300 mb-2">Senha</label>
                        <div class="relative">
                            <i data-lucide="lock-keyhole" class="w-5 h-5 text-zinc-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input
                                class="field w-full rounded-xl py-3.5 pl-12 pr-12 text-white placeholder:text-zinc-600"
                                type="password"
                                id="senha"
                                name="senha"
                                placeholder="Digite sua senha"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" id="btn-toggle-senha" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded-lg text-zinc-500 hover:text-white hover:bg-white/5 transition-colors" aria-label="Mostrar senha">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <p id="login-feedback" class="hidden rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-200"></p>

                    <button type="submit" class="group inline-flex w-full items-center justify-center gap-2 rounded-xl bg-[#10B981] px-5 py-4 text-sm font-bold text-white hover:bg-[#059669] focus:outline-none focus:ring-2 focus:ring-emerald-500/60 transition-colors">
                        Entrar
                        <i data-lucide="arrow-right" class="w-5 h-5 transition-transform group-hover:translate-x-1"></i>
                    </button>
                </form>

                <div class="mt-6 flex items-center justify-between gap-4 text-sm">
                    <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-200 transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Voltar ao site
                    </a>
                    <span class="text-zinc-600">Acesso restrito</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const AUTH_KEY = 'microcredito_admin_session';
        const formLoginEl = document.getElementById('form-login');
        const emailEl = document.getElementById('email');
        const senhaEl = document.getElementById('senha');
        const feedbackEl = document.getElementById('login-feedback');
        const btnToggleSenhaEl = document.getElementById('btn-toggle-senha');

        function usuarioAutenticado() {
            return Boolean(localStorage.getItem(AUTH_KEY));
        }

        if (usuarioAutenticado()) {
            window.location.replace('painel-admin.html');
        }

        function mostrarErro(mensagem) {
            feedbackEl.textContent = mensagem;
            feedbackEl.classList.remove('hidden');
        }

        btnToggleSenhaEl.addEventListener('click', () => {
            const mostrarSenha = senhaEl.type === 'password';
            senhaEl.type = mostrarSenha ? 'text' : 'password';
            btnToggleSenhaEl.setAttribute('aria-label', mostrarSenha ? 'Ocultar senha' : 'Mostrar senha');
            btnToggleSenhaEl.innerHTML = `<i data-lucide="${mostrarSenha ? 'eye-off' : 'eye'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        });

        formLoginEl.addEventListener('submit', event => {
            event.preventDefault();

            const email = emailEl.value.trim();
            const senha = senhaEl.value.trim();

            if (!email || !senha) {
                mostrarErro('Informe e-mail e senha para acessar o painel.');
                return;
            }

            localStorage.setItem(AUTH_KEY, JSON.stringify({
                email,
                autenticadoEm: new Date().toISOString()
            }));

            window.location.href = 'painel-admin.html';
        });
    </script>
</body>
</html>
